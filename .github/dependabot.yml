version: 2
updates:
  - package-ecosystem: composer
    directories:
      - "/"
      - "/tests/Integration"
      - "/vendor-bin/csfixer"
      - "/vendor-bin/openapi-extractor"
      - "/vendor-bin/phpunit"
      - "/vendor-bin/psalm"
      - "/vendor-bin/rector"
    schedule:
      interval: weekly
      day: saturday
      time: "03:00"
      timezone: Europe/Paris
    commit-message:
      prefix: "build"
      include: "scope"
    versioning-strategy: "increase"
    labels:
      - 3. to review
      - dependencies
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: ".github/workflows"
    commit-message:
      prefix: "ci"
      include: "scope"
    schedule:
      interval: weekly
      day: saturday
      time: "03:00"
      timezone: Europe/Berlin
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    target-branch: stable33
    directory: ".github/workflows"
    commit-message:
      prefix: "ci"
      include: "scope"
    schedule:
      interval: weekly
      day: saturday
      time: "03:00"
      timezone: Europe/Berlin
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    target-branch: stable32
    directory: ".github/workflows"
    commit-message:
      prefix: "ci"
      include: "scope"
    schedule:
      interval: weekly
      day: saturday
      time: "03:00"
      timezone: Europe/Berlin
    cooldown:
      default-days: 7
